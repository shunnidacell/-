<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crypto Arbitrage Console</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Real-time arbitrage console</p>
        <h1>Crypto Arbitrage Console</h1>
      </div>
      <div class="header-status">
        <div class="status" id="status">停止中</div>
        <div class="mode-badge" id="mode-badge">DEMO</div>
      </div>
    </header>

    <main class="layout">
      <section class="control-panel">
        <form id="settings-form">
          <div class="field-row">
            <label>
              <span>モード</span>
              <select name="mode" id="mode-select">
                <option value="demo">デモ取引</option>
                <option value="live">本番取引</option>
              </select>
            </label>
            <label class="checkline">
              <input name="auto_execute" type="checkbox" />
              <span>機会検出時に自動実行</span>
            </label>
            <label class="checkline">
              <input name="optimize_trade_size" type="checkbox" checked />
              <span>取引額を自動最適化</span>
            </label>
          </div>

          <label>
            <span>取引所</span>
            <input name="exchanges" value="binance,okx,bitget" />
          </label>
          <label>
            <span>監視銘柄</span>
            <textarea name="symbols" rows="3">BTC/USDT,ETH/USDT,SOL/USDT</textarea>
          </label>
          <div class="symbol-picker">
            <div class="picker-head">
              <span>銘柄クイック選択</span>
              <button type="button" id="clear-symbols-button">クリア</button>
            </div>
            <div id="symbol-options" class="symbol-options"></div>
          </div>

          <div class="grid-2">
            <label>
              <span>固定取引額</span>
              <input name="trade_size_quote" type="number" min="1" step="1" value="100" />
            </label>
            <label>
              <span>自動最適化の上限</span>
              <input name="max_trade_size_quote" type="number" min="1" step="1" value="1000" />
            </label>
            <label>
              <span>最低純利益 %</span>
              <input name="min_net_profit_pct" type="number" min="0" step="0.01" value="0.20" />
            </label>
            <label>
              <span>片道手数料 %</span>
              <input name="default_taker_fee_pct" type="number" min="0" step="0.01" value="0.10" />
            </label>
            <label>
              <span>片道スリッページ %</span>
              <input name="slippage_pct" type="number" min="0" step="0.01" value="0.03" />
            </label>
            <label>
              <span>更新秒数</span>
              <input name="poll_seconds" type="number" min="1" step="1" value="5" />
            </label>
            <label>
              <span>板の深さ</span>
              <input name="orderbook_limit" type="number" min="5" max="100" step="5" value="10" />
            </label>
          </div>

          <label id="live-confirm-row" class="hidden">
            <span>本番確認文字列</span>
            <input name="live_confirm" placeholder="I_UNDERSTAND_REAL_ORDERS" />
          </label>

          <div class="actions">
            <button type="submit" class="primary">開始</button>
            <button type="button" id="stop-button">停止</button>
            <button type="button" id="reset-demo-button">デモ口座リセット</button>
          </div>
        </form>
      </section>

      <section class="metrics">
        <div class="metric">
          <span>市場数</span>
          <strong id="market-count">0</strong>
        </div>
        <div class="metric">
          <span>裁定候補</span>
          <strong id="opportunity-count">0</strong>
        </div>
        <div class="metric">
          <span>最高純利益</span>
          <strong id="best-profit">-</strong>
        </div>
        <div class="metric">
          <span>デモ損益</span>
          <strong id="demo-profit">0</strong>
        </div>
      </section>

      <section class="main-panel">
        <div class="section-title">
          <h2>裁定候補</h2>
          <span id="last-tick">未取得</span>
        </div>
        <div id="opportunities" class="opportunity-list empty">まだ候補はありません</div>
      </section>

      <section class="split">
        <div class="panel">
          <div class="section-title">
            <h2>リアルタイム価格</h2>
          </div>
          <div class="table-wrap tall">
            <table>
              <thead>
                <tr>
                  <th>取引所</th>
                  <th>銘柄</th>
                  <th>状態</th>
                  <th>Bid</th>
                  <th>Ask</th>
                  <th>Fee</th>
                  <th>Fee source</th>
                  <th>詳細</th>
                </tr>
              </thead>
              <tbody id="markets"></tbody>
            </table>
          </div>
        </div>

        <div class="panel">
          <div class="section-title">
            <h2>デモ取引履歴</h2>
            <span id="demo-cash">-</span>
          </div>
          <div class="table-wrap tall">
            <table>
              <thead>
                <tr>
                  <th>時刻</th>
                  <th>銘柄</th>
                  <th>経路</th>
                  <th>利益</th>
                </tr>
              </thead>
              <tbody id="trades"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="split">
        <div class="panel">
          <div class="section-title">
            <h2>デモ残高</h2>
            <span>Paper account</span>
          </div>
          <div id="demo-account" class="account-grid"></div>
        </div>
        <div class="panel">
          <div class="section-title">
            <h2>本番残高</h2>
            <span id="live-ready">LIVE_TRADING=false</span>
          </div>
          <div id="balances" class="balances empty">本番モード起動時に表示されます</div>
        </div>
      </section>

      <section class="split">
        <div class="panel">
          <div class="section-title">
            <h2>ログ</h2>
          </div>
          <div id="logs" class="logs"></div>
        </div>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
